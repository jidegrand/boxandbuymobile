# Add inside the boxandbuy.com SSL vhost after the existing reverse proxies.
ProxyPreserveHost On
ProxyPass /mobile-api/ http://127.0.0.1:4000/
ProxyPassReverse /mobile-api/ http://127.0.0.1:4000/

<Location /mobile-api/>
    RequestHeader set X-Forwarded-Proto "https"
    Header set Access-Control-Allow-Origin "*"
    Header set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Header set Access-Control-Allow-Headers "Authorization, Content-Type, X-Client-Request-Id"
</Location>
